    <style>
      /* Docs-specific styles */
      .docs-stage {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      html {
        scroll-snap-type: y proximity;
      }

      .guide-picker-section {
        scroll-snap-align: start;
      }

      /* Nav override for docs page */
      nav {
        max-width: 1300px;
        margin: 0;
        padding: 22px 40px;
      }

      /* Footer fix — flex column parent breaks margin:auto centering */
      .docs-stage .footer {
        width: 100%;
        box-sizing: border-box;
      }

.docs-header {
        position: relative;
        z-index: 100;
        max-width: 1200px;
        margin: 0 auto;
        padding: 40px 40px 32px;
        text-align: center;
      }

      .docs-eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 4px 12px;
        border-radius: 999px;
        background: rgba(10, 24, 48, 0.55);
        border: 1px solid #1c3359;
        font-family: "Geist Mono", monospace;
        font-size: 10px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--muted);
        backdrop-filter: blur(10px);
        margin-bottom: 16px;
      }

      .docs-title {
        font-family: "Instrument Serif", serif;
        font-weight: 400;
        font-size: clamp(32px, 5vw, 48px);
        line-height: 1.1;
        letter-spacing: -0.02em;
        margin-bottom: 12px;
        color: var(--text);
      }

      .docs-subtitle {
        font-size: 16px;
        line-height: 1.6;
        color: var(--muted);
        font-weight: 300;
        max-width: 580px;
        margin: 0 auto;
      }

      .guide-picker-section {
        position: relative;
        z-index: 100;
        max-width: 1200px;
        margin: 0 auto;
        padding: 48px 40px 64px;
      }

      .guide-pills {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 16px;
        flex-wrap: wrap;
      }

      .guide-pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 14px;
        border-radius: 999px;
        border: 1px solid;
        font-family: "Geist Mono", monospace;
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        cursor: pointer;
        backdrop-filter: blur(10px);
        transition: all 0.2s;
        background: rgba(0, 0, 0, 0.2);
      }

      .guide-pill:hover {
        transform: translateY(-1px);
      }

      .guide-pill.active {
        box-shadow:
          0 0 16px var(--gem-glow),
          inset 0 0 12px var(--gem-glow);
      }

      .guide-pill-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: currentColor;
        box-shadow: 0 0 6px currentColor;
      }

      /* Gem color assignments - matching guide badge colors */
      .guide-pill[data-gem="sapphire"] {
        color: #3b82f6;
        border-color: rgba(59, 130, 246, 0.55);
        background: rgba(59, 130, 246, 0.04);
        box-shadow:
          0 0 12px rgba(59, 130, 246, 0.1),
          inset 0 0 8px rgba(59, 130, 246, 0.04);
        --gem-glow: rgba(59, 130, 246, 0.3);
      }

      .guide-pill[data-gem="aqua"] {
        color: #3ad4ff;
        border-color: rgba(58, 212, 255, 0.55);
        background: rgba(58, 212, 255, 0.04);
        box-shadow:
          0 0 12px rgba(58, 212, 255, 0.1),
          inset 0 0 8px rgba(58, 212, 255, 0.04);
        --gem-glow: rgba(58, 212, 255, 0.3);
      }

      .guide-pill[data-gem="topaz"] {
        color: #f59e0b;
        border-color: rgba(245, 158, 11, 0.55);
        background: rgba(245, 158, 11, 0.04);
        box-shadow:
          0 0 12px rgba(245, 158, 11, 0.1),
          inset 0 0 8px rgba(245, 158, 11, 0.04);
        --gem-glow: rgba(245, 158, 11, 0.3);
      }

      .guide-pill[data-gem="emerald"] {
        color: #10b981;
        border-color: rgba(16, 185, 129, 0.55);
        background: rgba(16, 185, 129, 0.04);
        box-shadow:
          0 0 12px rgba(16, 185, 129, 0.1),
          inset 0 0 8px rgba(16, 185, 129, 0.04);
        --gem-glow: rgba(16, 185, 129, 0.3);
      }

      .guide-pill[data-gem="amethyst"] {
        color: #a78bfa;
        border-color: rgba(167, 139, 250, 0.55);
        background: rgba(167, 139, 250, 0.04);
        box-shadow:
          0 0 12px rgba(167, 139, 250, 0.1),
          inset 0 0 8px rgba(167, 139, 250, 0.04);
        --gem-glow: rgba(167, 139, 250, 0.3);
      }

      .guide-container {
        position: relative;
        z-index: 100;
        flex: 1;
        max-width: 1400px;
        margin: 0 auto;
        padding: 0 40px 60px;
        width: 100%;
      }

      .guide-frame-wrap {
        border-radius: 16px;
        overflow: hidden;
        background: linear-gradient(180deg, #0a1226 0%, #050a18 100%);
        border: 1px solid #1c3359;
        box-shadow:
          0 0 0 1px #3ad4ff0a,
          0 20px 50px -20px #00000088;
        height: calc(100vh - 160px);
        min-height: 700px;
        position: relative;
      }

      .guide-loader {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #050a18;
        border-radius: 16px;
        transition: opacity 0.3s;
        z-index: 2;
      }

      .guide-loader.hidden {
        opacity: 0;
        pointer-events: none;
      }

      .guide-loader-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: rgba(58, 212, 255, 0.5);
        animation: loader-pulse 1.2s ease-in-out infinite;
      }

      .guide-loader-dot:nth-child(2) { animation-delay: 0.2s; }
      .guide-loader-dot:nth-child(3) { animation-delay: 0.4s; }

      @keyframes loader-pulse {
        0%, 80%, 100% { transform: scale(0.6); opacity: 0.3; }
        40% { transform: scale(1); opacity: 1; }
      }

      .guide-loader-inner {
        display: flex;
        gap: 8px;
      }

      .guide-iframe {
        width: 100%;
        height: 100%;
        border: none;
        display: block;
      }

      @keyframes gem-glow-pulse {
        0%, 100% {
          box-shadow:
            0 0 12px var(--gem-glow),
            inset 0 0 8px var(--gem-glow);
          background: rgba(255, 255, 255, 0.04);
        }
        50% {
          box-shadow:
            0 0 20px var(--gem-glow),
            inset 0 0 14px var(--gem-glow);
          background: rgba(255, 255, 255, 0.07);
        }
      }

      .guide-pill.active {
        animation: gem-glow-pulse 2.5s ease-in-out infinite;
      }

      @media (max-width: 768px) {
        .guide-pills {
          gap: 8px;
        }

        .guide-pill {
          padding: 8px 16px;
          font-size: 13px;
        }

        .docs-header {
          padding: 32px 24px 24px;
        }

        .guide-picker-section {
          padding: 0 24px 24px;
        }

        .guide-container {
          padding: 0 24px 40px;
        }

        .guide-frame-wrap {
          height: calc(100vh - 320px);
          min-height: 400px;
        }
      }

    <script>
      // Forward outer-page scroll to iframe so mouse position doesn't matter
      const guideWrap = document.querySelector(".guide-frame-wrap")

      document.addEventListener("wheel", (e) => {
        const frame = document.getElementById("guideFrame")
        if (!frame || !frame.contentWindow) return

        const wrapRect = guideWrap.getBoundingClientRect()
        const iframeVisible = wrapRect.top < window.innerHeight && wrapRect.bottom > 0

        // Check if mouse is over the iframe container
        const mouseOverIframe = e.clientX >= wrapRect.left &&
                               e.clientX <= wrapRect.right &&
                               e.clientY >= wrapRect.top &&
                               e.clientY <= wrapRect.bottom

        if (iframeVisible && mouseOverIframe) {
          try {
            frame.contentWindow.scrollBy({ top: e.deltaY, behavior: "auto" })
            e.preventDefault()
          } catch (err) {}
        }
      }, { passive: false })

      const pills = document.querySelectorAll(".guide-pill")
      const iframe = document.getElementById("guideFrame")
      const loader = document.getElementById("guideLoader")

      function showLoader() { loader.classList.remove("hidden") }
      function hideLoader() { loader.classList.add("hidden") }

      iframe.addEventListener("load", hideLoader)
      iframe.src = "docs/Genten_Docker_Setup_Guide.html"

      pills.forEach(pill => {
        pill.addEventListener("click", () => {
          pills.forEach(p => p.classList.remove("active"))
          pill.classList.add("active")
          showLoader()
          iframe.src = pill.getAttribute("data-guide")
        })
      })

      // Tweakable defaults for Saturn/rays
      const TWEAK_DEFAULTS = {
        saturnScale: 1,
        saturnOpacity: 0.25,
        saturnX: 0,
        saturnY: -2,
        saturnTilt: -15,
        gridSize: 18,
        gridGlow: 1.8,
        rays: 0.5,
      }

      const root = document.documentElement

      function applyTweaks(t) {
        root.style.setProperty("--saturn-scale", t.saturnScale)
        root.style.setProperty("--saturn-opacity", t.saturnOpacity)
        root.style.setProperty("--saturn-x", t.saturnX)
        root.style.setProperty("--saturn-y", t.saturnY)
        root.style.setProperty("--ring-tilt", t.saturnTilt + "deg")
        root.style.setProperty("--grid-size", t.gridSize + "px")
        root.style.setProperty("--grid-glow", t.gridGlow)
        root.style.setProperty("--rays-opacity", t.rays)
      }

      const tweaks = {...TWEAK_DEFAULTS}
      applyTweaks(tweaks)
    </script>
  </body>
</html>
