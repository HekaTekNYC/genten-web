<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Get Started | Genten</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="/assets/favicons/favicon.ico" />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="/assets/favicons/favicon-16x16.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/assets/favicons/favicon-32x32.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/assets/favicons/apple-touch-icon.png"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&family=Figtree:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../grid-bg.css" />
    <link rel="stylesheet" href="../style.css" />
    <style>
      .get-started-section {
        position: relative;
        z-index: 100;
        max-width: 800px;
        margin: 0 auto;
        padding: 80px 40px 120px;
        text-align: center;
      }
      .get-started-section h1 {
        font-family: "Instrument Serif", serif;
        font-weight: 400;
        font-size: clamp(48px, 7.2vw, 72px);
        line-height: 1.1;
        letter-spacing: -0.02em;
        margin: 0 auto 20px;
        color: var(--text);
      }
      .get-started-section .sub {
        margin: 0 auto 48px;
        font-size: 18px;
        line-height: 1.6;
        color: var(--muted);
        font-weight: 300;
      }
      .code-block-wrapper {
        position: relative;
        max-width: 600px;
        margin: 0 auto 40px;
      }
      .copy-button {
        position: absolute;
        top: 12px;
        right: 12px;
        padding: 6px 14px;
        border-radius: 6px;
        font-size: 12px;
        font-weight: 500;
        font-family: "Geist Mono", monospace;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid var(--line);
        color: var(--muted);
        cursor: pointer;
        transition: all 0.2s;
        z-index: 1;
      }
      .copy-button:hover {
        background: rgba(255, 255, 255, 0.12);
        border-color: var(--accent);
        color: var(--text);
      }
      .copy-button.copied {
        background: rgba(58, 212, 255, 0.15);
        border-color: var(--accent);
        color: var(--accent);
      }
      .code-block {
        position: relative;
        background: linear-gradient(180deg, #0a1226 0%, #050a18 100%);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 40px 24px 24px;
        overflow-x: auto;
      }
      .code-block pre {
        margin: 0;
        font-family: "Geist Mono", monospace;
        font-size: 14px;
        line-height: 1.6;
        color: var(--accent-soft);
        text-align: left;
        white-space: pre;
        overflow-x: auto;
      }
      .install-link {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 14px 24px;
        border-radius: 10px;
        font-size: 15px;
        font-weight: 500;
        text-decoration: none;
        background: var(--btn-primary-bg);
        color: var(--btn-primary-fg);
        border: none;
        transition: all 0.2s;
        box-shadow:
          0 1px 0 rgba(255, 255, 255, 0.6) inset,
          0 10px 40px -10px #3ad4ff88;
      }
      .install-link:hover {
        transform: translateY(-1px);
        box-shadow:
          0 1px 0 rgba(255, 255, 255, 0.6) inset,
          0 14px 50px -10px #3ad4ffaa;
      }
      .install-link i {
        width: 18px;
        height: 18px;
      }
    </style>
  </head>
  <body>
    <div class="stage genten-stage">
      <!-- Saturn with rings, upper right -->
      <div
        class="saturn"
        aria-hidden="true"
        style="
          opacity: var(--saturn-opacity, 0.1);
          transform: scale(var(--saturn-scale, 1));
          transform-origin: top right;
        "
      >
        <svg viewBox="0 0 800 800" fill="none">
          <defs>
            <radialGradient id="saturnBody" cx="0.42" cy="0.38" r="0.62">
              <stop offset="0%" stop-color="var(--warm)" stop-opacity="0.95" />
              <stop
                offset="55%"
                stop-color="var(--saturn-ring)"
                stop-opacity="0.55"
              />
              <stop
                offset="100%"
                stop-color="var(--saturn-ring)"
                stop-opacity="0.05"
              />
            </radialGradient>
            <radialGradient id="saturnShade" cx="0.7" cy="0.65" r="0.6">
              <stop offset="0%" stop-color="#000" stop-opacity="0.55" />
              <stop offset="100%" stop-color="#000" stop-opacity="0" />
            </radialGradient>
            <radialGradient id="saturnGlow" cx="0.5" cy="0.5" r="0.5">
              <stop offset="0%" stop-color="var(--warm)" stop-opacity="0.35" />
              <stop
                offset="60%"
                stop-color="var(--saturn-ring)"
                stop-opacity="0.12"
              />
              <stop
                offset="100%"
                stop-color="var(--saturn-ring)"
                stop-opacity="0"
              />
            </radialGradient>
            <linearGradient id="ringGrad" x1="0" x2="1" y1="0" y2="0">
              <stop
                offset="0%"
                stop-color="var(--saturn-ring)"
                stop-opacity="0"
              />
              <stop offset="30%" stop-color="var(--warm)" stop-opacity="0.75" />
              <stop
                offset="55%"
                stop-color="var(--saturn-ring)"
                stop-opacity="0.85"
              />
              <stop offset="78%" stop-color="var(--warm)" stop-opacity="0.55" />
              <stop
                offset="100%"
                stop-color="var(--saturn-ring)"
                stop-opacity="0"
              />
            </linearGradient>
            <clipPath id="ringBack">
              <rect x="0" y="0" width="800" height="400" />
            </clipPath>
            <clipPath id="ringFront">
              <rect x="0" y="400" width="800" height="400" />
            </clipPath>
          </defs>

          <!-- soft atmospheric glow behind everything -->
          <circle cx="400" cy="400" r="320" fill="url(#saturnGlow)" />

          <!-- rings only, no planet body -->
          <g
            style="
              transform: rotate(var(--ring-tilt, -22deg));
              transform-origin: 400px 400px;
            "
          >
            <ellipse
              cx="400"
              cy="400"
              rx="340"
              ry="70"
              stroke="url(#ringGrad)"
              stroke-width="3"
              fill="none"
            />
            <ellipse
              cx="400"
              cy="400"
              rx="305"
              ry="58"
              stroke="url(#ringGrad)"
              stroke-width="1.8"
              fill="none"
              opacity="0.75"
            />
            <ellipse
              cx="400"
              cy="400"
              rx="275"
              ry="46"
              stroke="url(#ringGrad)"
              stroke-width="1.2"
              fill="none"
              opacity="0.55"
            />
          </g>
        </svg>
      </div>

      <!-- Light rays from above -->
      <svg
        class="rays"
        viewBox="0 0 1400 800"
        preserveAspectRatio="none"
        aria-hidden="true"
      >
        <defs>
          <linearGradient id="ray" x1="0.5" y1="0" x2="0.5" y2="1">
            <stop
              offset="0%"
              stop-color="var(--ray-color)"
              stop-opacity="0.38"
            />
            <stop
              offset="40%"
              stop-color="var(--ray-color)"
              stop-opacity="0.18"
            />
            <stop
              offset="80%"
              stop-color="var(--ray-color)"
              stop-opacity="0.04"
            />
            <stop
              offset="100%"
              stop-color="var(--ray-color)"
              stop-opacity="0"
            />
          </linearGradient>
          <radialGradient id="raySource" cx="0.5" cy="0" r="0.35">
            <stop
              offset="0%"
              stop-color="var(--ray-color)"
              stop-opacity="0.55"
            />
            <stop
              offset="100%"
              stop-color="var(--ray-color)"
              stop-opacity="0"
            />
          </radialGradient>
          <filter id="rayBlur"><feGaussianBlur stdDeviation="22" /></filter>
        </defs>
        <!-- top-of-sky glow source -->
        <rect x="0" y="0" width="1400" height="400" fill="url(#raySource)" />
        <!-- broad beam fanning down and outward -->
        <g filter="url(#rayBlur)">
          <polygon
            points="700,-40 380,820 1020,820"
            fill="url(#ray)"
            opacity="0.75"
          />
          <polygon points="700,-40 560,820 840,820" fill="url(#ray)" />
          <polygon
            points="700,-40 660,820 740,820"
            fill="url(#ray)"
            opacity="0.9"
          />
        </g>
      </svg>

      <!-- Grid floor (from grid-bg.css) -->
      <div class="genten-horizon"></div>
      <div class="genten-floor">
        <div class="genten-floor-grid"></div>
      </div>

      <nav>
        <div class="brand">
          <span class="brand-mark">
            <svg
              role="img"
              viewBox="0 0 24 24"
              xmlns="http://www.w3.org/2000/svg"
              aria-label="Genten"
            >
              <title>Saturn</title>
              <path
                fill="currentColor"
                d="M19.039 11.459c.001.015.022.244.03.407.006.113 0 .29 0 .3.003 0 .029.023.03.024 1.428 1.17 2.943 2.767 3.204 3.94.073.325.056.618-.072.868-.152.293-.439.503-.834.638-2.046.7-6.925-.642-10.907-2.609-2.845-1.406-5.342-3.081-7.032-4.719-1.57-1.523-1.995-2.71-1.59-3.427.155-.271.42-.472.776-.609 1.299-.507 3.788-.152 6.239.579-1.16.866-1.968 2.034-2.342 3.202l-.001.007a.051.051 0 0 1-.001.006c-.115 1.07 1.434 2.47 3 3.25-.002-.006.084.032.084.026-.002-.006-.015-.109-.017-.113-.366-2.66 1.648-6.64 3.765-7.513.136-.056.254-.09.27-.095l-.273-.027c-.074-.006-.148-.013-.228-.015a7.464 7.464 0 0 0-.272-.01 6.443 6.443 0 0 0-3.4.892C5.378 5.057 2.383 4.892 1.13 5.31c-.497.167-.833.418-1 .751-.174.35-.175.79-.002 1.306.57 1.704 3.058 4.032 6.211 6.099.457 2.407 2.615 4.875 5.703 5.204l.142.015a.278.278 0 0 1 .05 0 6.618 6.618 0 0 0-.173-.132c-.955-.736-1.813-1.949-2.107-3l.185.093.143.07c4.985 2.465 10.215 3.72 12.53 2.947.519-.174.9-.418 1.075-.768.167-.335.139-.78-.029-1.278-.436-1.3-2.304-3.284-4.675-5.052a5.003 5.003 0 0 0-.145-.107"
              />
            </svg>
          </span>
          Genten
        </div>
      </nav>

      <section class="get-started-section">
        <h1>Get Started</h1>
        <p class="sub">Self-hosted. Docker. 15 minutes to set up.</p>

        <div class="code-block-wrapper">
          <button class="copy-button" onclick="copyCode(this)">Copy</button>
          <div class="code-block">
            <pre>docker pull ghcr.io/hekateknyc/genten:latest</pre>
          </div>
        </div>

        <a href="/Genten_Docker_Setup_Guide.html" class="install-link">
          <i data-lucide="terminal"></i>
          <span>Install Genten in 15 minutes →</span>
        </a>
      </section>

      <footer class="footer">
        <span class="footer-brand">Genten</span>
        <span class="footer-copyright">© 2026 HekaTek LLC</span>
      </footer>
    </div>

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script>
      function copyCode(btn) {
        const pre = btn.nextElementSibling.querySelector('pre');
        navigator.clipboard.writeText(pre.textContent).then(() => {
          btn.textContent = 'Copied!';
          btn.classList.add('copied');
          setTimeout(() => {
            btn.textContent = 'Copy';
            btn.classList.remove('copied');
          }, 2000);
        });
      }

      lucide.createIcons();
    </script>
  </body>
</html>
